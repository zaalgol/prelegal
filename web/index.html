<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutual NDA Creator</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #1c2733; }
    h1 { font-size: 1.6rem; }
    fieldset { border: 1px solid #d0d7de; border-radius: 8px; margin-bottom: 1.2rem; padding: 1rem; }
    legend { font-weight: 600; padding: 0 .4rem; }
    label { display: block; margin-top: .6rem; font-weight: 500; }
    input[type=text], input[type=date], textarea { width: 100%; box-sizing: border-box; padding: .45rem; margin-top: .2rem; border: 1px solid #d0d7de; border-radius: 6px; font: inherit; }
    .radio-row { margin-top: .4rem; font-weight: 400; }
    .radio-row input[type=text] { width: 4rem; display: inline-block; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    button { margin-top: .5rem; padding: .6rem 1.4rem; font: inherit; font-weight: 600; color: #fff; background: #2563eb; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .note { color: #57606a; font-size: .88rem; }
  </style>
</head>
<body>
  <h1>Mutual NDA Creator</h1>
  <p class="note">Fill in the key deal terms below to generate a Mutual Non-Disclosure Agreement based on the
    <a href="https://commonpaper.com/standards/mutual-nda/1.0">Common Paper Mutual NDA (v1.0)</a> template.</p>

  <form action="/generate" method="post">
    <fieldset>
      <legend>Agreement Terms</legend>
      <label for="purpose">Purpose — how Confidential Information may be used</label>
      <textarea id="purpose" name="purpose" rows="2" required>Evaluating whether to enter into a business relationship with the other party.</textarea>

      <label for="effective_date">Effective Date</label>
      <input type="date" id="effective_date" name="effective_date" value="{{ today }}" required>

      <label>MNDA Term — the length of this MNDA</label>
      <div class="radio-row">
        <input type="radio" id="term_fixed" name="term_type" value="fixed" checked>
        <label for="term_fixed" style="display:inline">Expires
          <input type="text" name="term_years" value="1" size="3"> year(s) from Effective Date</label>
      </div>
      <div class="radio-row">
        <input type="radio" id="term_open" name="term_type" value="until_terminated">
        <label for="term_open" style="display:inline">Continues until terminated in accordance with the terms of the MNDA</label>
      </div>

      <label>Term of Confidentiality — how long Confidential Information is protected</label>
      <div class="radio-row">
        <input type="radio" id="conf_fixed" name="conf_type" value="fixed" checked>
        <label for="conf_fixed" style="display:inline">
          <input type="text" name="conf_years" value="1" size="3"> year(s) from Effective Date
          (trade secrets protected as long as applicable law provides)</label>
      </div>
      <div class="radio-row">
        <input type="radio" id="conf_open" name="conf_type" value="perpetuity">
        <label for="conf_open" style="display:inline">In perpetuity</label>
      </div>

      <label for="governing_law">Governing Law (state)</label>
      <input type="text" id="governing_law" name="governing_law" placeholder="e.g. Delaware" required>

      <label for="jurisdiction">Jurisdiction (city or county and state)</label>
      <input type="text" id="jurisdiction" name="jurisdiction" placeholder="e.g. New Castle, DE" required>
    </fieldset>

    <div class="two-col">
      <fieldset>
        <legend>Party 1</legend>
        <label for="party1_name">Name</label>
        <input type="text" id="party1_name" name="party1_name" required>
        <label for="party1_title">Title</label>
        <input type="text" id="party1_title" name="party1_title">
        <label for="party1_company">Company</label>
        <input type="text" id="party1_company" name="party1_company" required>
        <label for="party1_address">Notice Address (email or postal)</label>
        <input type="text" id="party1_address" name="party1_address" required>
      </fieldset>

      <fieldset>
        <legend>Party 2</legend>
        <label for="party2_name">Name</label>
        <input type="text" id="party2_name" name="party2_name" required>
        <label for="party2_title">Title</label>
        <input type="text" id="party2_title" name="party2_title">
        <label for="party2_company">Company</label>
        <input type="text" id="party2_company" name="party2_company" required>
        <label for="party2_address">Notice Address (email or postal)</label>
        <input type="text" id="party2_address" name="party2_address" required>
      </fieldset>
    </div>

    <button type="submit">Generate Mutual NDA</button>
  </form>
</body>
</html>
