<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Mutual NDA</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; color: #1c2733; }
    .toolbar { display: flex; gap: .8rem; align-items: center; margin-bottom: 1.2rem; }
    .toolbar a { color: #2563eb; }
    button { padding: .6rem 1.4rem; font: inherit; font-weight: 600; color: #fff; background: #2563eb; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .document { border: 1px solid #d0d7de; border-radius: 8px; padding: 2rem 2.5rem; background: #fff; }
    .document table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    .document th, .document td { border: 1px solid #d0d7de; padding: .5rem .7rem; text-align: left; }
    .document h1 { font-size: 1.5rem; }
  </style>
</head>
<body>
  <div class="toolbar">
    <form action="/download" method="post">
      {% for name, value in fields.items() %}
      <input type="hidden" name="{{ name }}" value="{{ value }}">
      {% endfor %}
      <button type="submit">Download document</button>
    </form>
    <a href="/">&larr; Start over</a>
  </div>

  <div class="document">
    {{ document_html | safe }}
  </div>
</body>
</html>
